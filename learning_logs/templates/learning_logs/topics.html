{% extends 'learning_logs/base.html' %}

{% block content %}

<p>Topics</p>



<ul>
   {% for topic in topics %}

        <li>

            <a href="{% url 'learning_logs:topic' topic.id %}">

                {{ topic }}

            </a>

        </li>
    {% empty %}

        <li>No topics have been added yet.</li>

        

    {% endfor %}

    <div >
       <a href="{% url 'learning_logs:new_topic' %}"
   style="
      position: fixed;
      bottom: 50%;
      right: 15%;
      display: inline-block;
      background: linear-gradient(90deg, #5b5b5b, #243a76);
      color: white;
      padding: 14px 35px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.3);
      z-index: 1000;
   ">
    + Add New Topic
</a>
</div>
   


</ul>




{% endblock content %}

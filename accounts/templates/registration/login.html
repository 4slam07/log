{% extends 'learning_logs/base.html' %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding: 10px;">
    <div style="background: white; padding: 32px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid #e5e7eb;">
        <h2 style="margin-top: 0; text-align: center; color: #2563eb;">Welcome Back</h2>
        <p style="text-align: center; color: #6b7280; margin-bottom: 24px;">Log in to continue to Learning Logs.</p>

        {% if form.errors %}
            <p style="background: #fee2e2; color: #b91c1c; padding: 10px 14px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px;">
                Your username and password didn't match. Please try again.
            </p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div style="display: flex; flex-direction: column; gap: 16px;">
                {{ form.as_p }}
                <button name="submit" style="background: linear-gradient(90deg, #2563eb, #1d4ed8); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,0.25);">
                    Log In
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
